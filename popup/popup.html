<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 290px;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: #534AB7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 15px;
    }
    h2 { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .subtitle { font-size: 11px; color: #999; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 5px;
    }
    .input-wrap { position: relative; margin-bottom: 10px; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 9px 36px 9px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #534AB7; }
    .toggle-vis {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
      padding: 0;
    }

    button.save {
      width: 100%;
      padding: 9px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    button.save:hover { background: #4340a0; }

    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      height: 18px;
    }
    .status.ok { color: #27ae60; }
    .status.err { color: #c0392b; }

    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }

    .info {
      font-size: 11px;
      color: #aaa;
      line-height: 1.6;
    }
    .info a { color: #534AB7; text-decoration: none; }

    .shortcut {
      margin-top: 12px;
      padding: 8px 10px;
      background: #f7f6ff;
      border-radius: 8px;
      font-size: 11px;
      color: #534AB7;
    }
    kbd {
      background: #534AB7;
      color: white;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦</div>
    <div>
      <h2>AI Writing Co-Pilot</h2>
      <div class="subtitle">Powered by Claude</div>
    </div>
  </div>

  <label>Tu API Key de Anthropic</label>
  <div class="input-wrap">
    <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
    <button class="toggle-vis" id="toggleVis" title="Mostrar/ocultar">👁</button>
  </div>
  <button class="save" id="saveBtn">Guardar configuración</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <div class="info">
    Tu API key se guarda localmente en tu navegador. Nunca se envía a servidores de terceros.<br><br>
    Obtén tu key en <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </div>

  <div class="shortcut">
    Atajo: <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>W</kbd> abre el copiloto en cualquier campo de texto
  </div>

  <script src="popup.js"></script>
</body>
</html>
